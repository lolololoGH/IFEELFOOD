<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Player Vidéo</title>
</head>
<body style="margin:0; padding:0; background-color:black; overflow:hidden; width:100vw; height:100vw;">
    
    <video id="v" width="100%" height="100%" autoplay loop muted playsinline style="object-fit: contain; display:block;">
        <source src="https://vz-df98bbb0-26e.b-cdn.net/4362434a-15e7-46e6-9edf-67d176df7fef/play_1080p.mp4" type="video/mp4">
    </video>

    <script>
        // Force le démarrage de la vidéo si l'autoplay HTML échoue
        const video = document.getElementById('v');
        video.play().catch(function(error) {
            console.log("La lecture automatique a échoué : ", error);
            // En cas d'échec, on essaye de recharger la vidéo au clic (inutile sur l'écran mais bon pour le debug)
            document.body.addEventListener('click', function() {
                video.play();
            }, { once: true });
        });
    </script>

</body>
</html>
